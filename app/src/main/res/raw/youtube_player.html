<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ACE PLAYER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08080c;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.top-bar{background:#0d0d14;padding:10px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1a2a;flex-shrink:0}
.top-bar h1{font-size:13px;color:#c8a54e;letter-spacing:4px;font-weight:700}
.top-bar .status{font-size:11px;color:#555;margin-left:auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:6px;height:6px;background:#4ade80;border-radius:50%;margin-left:6px;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.now-playing{background:linear-gradient(180deg,#0d0d16 0%,#08080c 100%);padding:20px 24px 16px;flex-shrink:0}
.np-title{font-size:22px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.np-artist{font-size:15px;color:#888;margin-bottom:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-wrap{width:100%;height:12px;background:#1a1a2a;border-radius:6px;cursor:pointer;position:relative;margin-bottom:6px;touch-action:none}
.prog-fill{height:100%;border-radius:6px;width:0%;background:linear-gradient(90deg,#6c5ce7 0%,#c8a54e 100%);transition:width 0.4s linear}
.prog-knob{position:absolute;top:-4px;width:20px;height:20px;background:#fff;border-radius:50%;transform:translateX(-50%);left:0%;transition:left 0.4s linear;box-shadow:0 0 8px rgba(108,92,231,0.6)}
.time-row{display:flex;justify-content:space-between;font-size:12px;color:#555;margin-bottom:16px}
.controls{display:flex;align-items:center;justify-content:center;gap:20px}
.ctrl{background:none;border:none;cursor:pointer;padding:12px;border-radius:50%;display:flex;align-items:center;justify-content:center;min-width:56px;min-height:56px;transition:background 0.15s}
.ctrl:active{background:rgba(255,255,255,0.08)}
.ctrl svg{fill:#fff;width:32px;height:32px}
.ctrl.main{background:linear-gradient(135deg,#6c5ce7,#a855f7);min-width:72px;min-height:72px;border-radius:50%}
.ctrl.main svg{width:40px;height:40px}
.ctrl.main:active{background:linear-gradient(135deg,#5a4bd6,#9645e6)}
.ctrl.side svg{width:24px;height:24px;fill:#666}
.ctrl.side.on svg{fill:#c8a54e}
.tab-row{display:flex;gap:6px;padding:12px 16px 8px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-row::-webkit-scrollbar{display:none}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:#666;border:1px solid #1a1a2a;border-radius:20px;cursor:pointer;background:none;white-space:nowrap;min-height:44px;display:flex;align-items:center;flex-shrink:0}
.tab.active{color:#c8a54e;border-color:#c8a54e;background:rgba(200,165,78,0.08)}
.tab:active{background:rgba(255,255,255,0.05)}
.playlist{flex:1;overflow-y:auto;padding:4px 12px 120px;-webkit-overflow-scrolling:touch}
.track{display:flex;align-items:center;gap:14px;padding:16px 12px;border-bottom:1px solid #0f0f18;cursor:pointer;border-radius:10px;min-height:64px;transition:background 0.12s}
.track:active{background:rgba(108,92,231,0.12)}
.track.active{background:rgba(200,165,78,0.08)}
.track.active .t-title{color:#c8a54e}
.track.active .t-num{display:none}
.track.active .eq{display:flex}
.track.error .t-title{color:#555;text-decoration:line-through}
.t-num{width:28px;font-size:14px;color:#444;text-align:center;flex-shrink:0;font-weight:600}
.t-info{flex:1;min-width:0}
.t-title{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-artist{font-size:12px;color:#666;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq{display:none;width:20px;height:20px;gap:2px;align-items:flex-end;flex-shrink:0}
.eq span{width:4px;background:#c8a54e;border-radius:2px;animation:eq 0.7s ease-in-out infinite alternate}
.eq span:nth-child(2){animation-delay:0.15s}
.eq span:nth-child(3){animation-delay:0.3s}
@keyframes eq{0%{height:4px}100%{height:16px}}
#ytWrap{position:fixed;bottom:0;right:0;width:2px;height:2px;overflow:hidden;opacity:0.01;z-index:-1}
.loading{position:fixed;inset:0;background:rgba(8,8,12,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.5s}
.loading.hide{opacity:0;pointer-events:none}
.spinner{width:44px;height:44px;border:3px solid #1a1a2a;border-top-color:#c8a54e;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{margin-top:16px;color:#444;font-size:12px;letter-spacing:2px}
@media(orientation:landscape) and (max-height:500px){
.now-playing{padding:10px 24px 8px}.np-title{font-size:18px}.controls{gap:16px}
.ctrl{min-width:48px;min-height:48px;padding:8px}.ctrl.main{min-width:60px;min-height:60px}
.track{padding:10px 12px;min-height:52px}.tab{padding:8px 14px;font-size:12px;min-height:38px}
.playlist{padding-bottom:60px}
}
</style>
</head>

const TAB_NAMES={ace:'Ace Burns',drake:'Drizzy',bars:'Bars',heat:'Heat',queens:'Queens',afro:'Afro',smooth:'Smooth',soul:'Soul',vibes:'Vibes',santana:'Santana'};
const TAB_ORDER=['ace','drake','bars','heat','queens','afro','smooth','soul','vibes','santana'];

let cur='ace',idx=-1,yt=null,ready=false;
let shuf=false,rep=false,timer=null,shufQ=[];
let errSet=new Set(),retries=0;

/* === ANDROID BRIDGE HELPERS === */
var hasAndroidBridge = (typeof AndroidBridge !== 'undefined');

function bridgeStateChange(state) {
    if (hasAndroidBridge) try { AndroidBridge.onStateChange(state); } catch(e) {}
}
function bridgeVideoInfo(videoId, title, author) {
    if (hasAndroidBridge) try { AndroidBridge.onVideoInfo(videoId, title, author); } catch(e) {}
}
function bridgeError(code) {
    if (hasAndroidBridge) try { AndroidBridge.onError(code); } catch(e) {}
}
function bridgeReady() {
    if (hasAndroidBridge) try { AndroidBridge.onPlayerReady(); } catch(e) {}
}

/* === EXPOSED FOR NATIVE COMMANDS === */
/* The Kotlin side calls: player.playVideo(), player.pauseVideo(), etc.
   We expose a 'player' proxy that delegates to the YT player */
var player = {
    playVideo: function() { if (yt) yt.playVideo(); },
    pauseVideo: function() { if (yt) yt.pauseVideo(); },
    seekTo: function(sec, allowSeekAhead) { if (yt) yt.seekTo(sec, allowSeekAhead); },
    loadVideoById: function(id) { if (yt) yt.loadVideoById({videoId: id, startSeconds: 0}); },
    getCurrentTime: function() { return yt ? yt.getCurrentTime() : 0; },
    getDuration: function() { return yt ? yt.getDuration() : 0; },
    getPlayerState: function() { return yt ? yt.getPlayerState() : -1; }
};

function nextTrack() { next(); }
function previousTrack() { prev(); }

/* === UI FUNCTIONS === */
function renderTabs(){
document.getElementById('tabs').innerHTML=TAB_ORDER.map(k=>
'<button class="tab'+(k===cur?' active':'')+'" onclick="switchPL(\''+k+'\')">'+TAB_NAMES[k]+'</button>'
).join('');
}

function renderPL(){
var tracks=PL[cur];
document.getElementById('pl').innerHTML=tracks.map(function(t,i){
var broken=errSet.has(t.id);
return '<div class="track'+(i===idx?' active':'')+(broken?' error':'')+'" onclick="play('+i+')" id="tr'+i+'">'+
'<span class="t-num">'+(i+1)+'</span>'+
'<div class="eq"><span></span><span></span><span></span></div>'+
'<div class="t-info"><div class="t-title">'+t.t+'</div><div class="t-artist">'+t.a+'</div></div>'+
'</div>';
}).join('');
}

function switchPL(k){cur=k;idx=-1;retries=0;renderTabs();buildShuf();renderPL();}

function play(i){
var tracks=PL[cur];
if(i<0||i>=tracks.length)return;
idx=i;retries=0;
var t=tracks[i];
document.getElementById('npTitle').textContent=t.t;
document.getElementById('npArtist').textContent=t.a;
renderPL();
var el=document.getElementById('tr'+i);
if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
if(ready){
yt.loadVideoById({videoId:t.id,startSeconds:0});
setTimeout(function(){try{yt.playVideo();}catch(e){}},300);
setTimeout(function(){try{yt.playVideo();}catch(e){}},900);
}
setIcon(true);startTimer();stat('Loading...');
bridgeVideoInfo(t.id, t.t, t.a);
if('mediaSession' in navigator){
navigator.mediaSession.metadata=new MediaMetadata({title:t.t,artist:t.a,album:'ACE PLAYER'});
navigator.mediaSession.setActionHandler('play',function(){togglePlay();});
navigator.mediaSession.setActionHandler('pause',function(){togglePlay();});
navigator.mediaSession.setActionHandler('nexttrack',function(){next();});
navigator.mediaSession.setActionHandler('previoustrack',function(){prev();});
}
}

function togglePlay(){
if(!ready)return;
var s=yt.getPlayerState();
if(s===1){yt.pauseVideo();setIcon(false);stat('Paused');}
else{yt.playVideo();setIcon(true);stat('Playing');}
}

function next(){
var tracks=PL[cur];
if(shuf){var si=shufQ.indexOf(idx);play(shufQ[(si+1)%shufQ.length]);}
else{play((idx+1)%tracks.length);}
}

function prev(){
if(ready&&yt.getCurrentTime&&yt.getCurrentTime()>3){yt.seekTo(0);return;}
var tracks=PL[cur];
if(shuf){var si=shufQ.indexOf(idx);play(shufQ[(si-1+shufQ.length)%shufQ.length]);}
else{play((idx-1+tracks.length)%tracks.length);}
}

function toggleShuffle(){shuf=!shuf;document.getElementById('shufBtn').classList.toggle('on',shuf);if(shuf)buildShuf();}
function toggleRepeat(){rep=!rep;document.getElementById('repBtn').classList.toggle('on',rep);}

function buildShuf(){
var n=PL[cur].length;shufQ=[];for(var i=0;i<n;i++)shufQ.push(i);
for(var i=n-1;i>0;i--){var j=Math.random()*i|0;var tmp=shufQ[i];shufQ[i]=shufQ[j];shufQ[j]=tmp;}
}

function startTimer(){
if(timer)clearInterval(timer);
timer=setInterval(function(){
if(!ready||!yt.getCurrentTime)return;
var c=yt.getCurrentTime()||0,d=yt.getDuration()||1;
var p=(c/d)*100;
document.getElementById('progFill').style.width=p+'%';
document.getElementById('progKnob').style.left=p+'%';
document.getElementById('tNow').textContent=fmt(c);
document.getElementById('tEnd').textContent=fmt(d);
},500);
}

document.getElementById('progWrap').addEventListener('click',function(e){
if(!ready)return;
var r=e.currentTarget.getBoundingClientRect();
yt.seekTo((e.clientX-r.left)/r.width*(yt.getDuration()||0),true);
});

var dragging=false;
document.getElementById('progWrap').addEventListener('touchstart',function(){dragging=true;},{passive:true});
document.getElementById('progWrap').addEventListener('touchmove',function(e){
if(!dragging||!ready)return;
var r=e.currentTarget.getBoundingClientRect();
var p=Math.max(0,Math.min(1,(e.touches[0].clientX-r.left)/r.width));
document.getElementById('progFill').style.width=(p*100)+'%';
document.getElementById('progKnob').style.left=(p*100)+'%';
},{passive:true});
document.getElementById('progWrap').addEventListener('touchend',function(e){
if(!dragging||!ready)return;dragging=false;
var r=e.currentTarget.getBoundingClientRect();
var p=Math.max(0,Math.min(1,(e.changedTouches[0].clientX-r.left)/r.width));
yt.seekTo(p*(yt.getDuration()||0),true);
},{passive:true});

function fmt(s){if(!s||isNaN(s))return'0:00';s=Math.floor(s);return(s/60|0)+':'+(s%60<10?'0':'')+(s%60);}
function stat(t){document.getElementById('status').textContent=t;}
function setIcon(playing){
document.getElementById('ppIco').innerHTML=playing?
'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';
}

/* Auto-play first track on load for car experience */
function autoPlayFirst(){
if(idx===-1 && PL[cur].length > 0){
play(0);
}
}

var tag=document.createElement('script');
tag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady=function(){
yt=new YT.Player('yt',{
width:'320',height:'180',
playerVars:{autoplay:1,controls:0,disablekb:1,fs:0,modestbranding:1,rel:0,playsinline:1,enablejsapi:1},
events:{
onReady:function(){
ready=true;
document.getElementById('loader').classList.add('hide');
stat('Tap a track');
bridgeReady();
autoPlayFirst();
},
onStateChange:function(e){
bridgeStateChange(e.data);
if(e.data===1){setIcon(true);stat('Playing');retries=0;}
if(e.data===2){setIcon(false);stat('Paused');}
if(e.data===0){if(rep)play(idx);else next();}
if(e.data===-1&&idx>=0){setTimeout(function(){try{yt.playVideo();}catch(e){}},500);}
},
onError:function(e){
bridgeError(e.data);
var tracks=PL[cur];
if(idx>=0&&idx<tracks.length){errSet.add(tracks[idx].id);renderPL();}
retries++;stat('Blocked — skipping');
if(retries<tracks.length){setTimeout(function(){next();},800);}
else{stat('All tracks blocked');retries=0;}
}
}
});
};

buildShuf();renderTabs();renderPL();
</script>
</body>
</html>
