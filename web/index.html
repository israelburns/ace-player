<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ACE PLAYER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08080c;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;position:relative}



::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.top-bar{background:#0d0d14;padding:10px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #1a1a2a;flex-shrink:0}
.top-bar h1{font-size:13px;color:#c8a54e;letter-spacing:4px;font-weight:700}
.top-bar .status{font-size:11px;color:#555;margin-left:auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:6px;height:6px;background:#4ade80;border-radius:50%;margin-left:6px;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.now-playing{background:linear-gradient(180deg,#0d0d16 0%,#08080c 100%);padding:16px 24px 14px;flex-shrink:0;display:flex;gap:16px;align-items:center}
.np-art{width:72px;height:72px;border-radius:8px;background:#1a1a2a;flex-shrink:0;overflow:hidden}
.np-art img{width:100%;height:100%;object-fit:cover}
.np-info{flex:1;min-width:0}
.np-title{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.np-artist{font-size:14px;color:#888;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-wrap{width:100%;height:10px;background:#1a1a2a;border-radius:5px;cursor:pointer;position:relative;margin-bottom:4px;touch-action:none}
.prog-fill{height:100%;border-radius:5px;width:0%;background:linear-gradient(90deg,#6c5ce7 0%,#c8a54e 100%);transition:width 0.4s linear}
.prog-knob{position:absolute;top:-5px;width:20px;height:20px;background:#fff;border-radius:50%;transform:translateX(-50%);left:0%;transition:left 0.4s linear;box-shadow:0 0 8px rgba(108,92,231,0.6)}
.time-row{display:flex;justify-content:space-between;font-size:11px;color:#555}
.controls{display:flex;align-items:center;justify-content:center;gap:18px;padding:4px 0 2px;flex-shrink:0}
.ctrl{background:none;border:none;cursor:pointer;padding:10px;border-radius:50%;display:flex;align-items:center;justify-content:center;min-width:50px;min-height:50px;transition:background 0.15s}
.ctrl:active{background:rgba(255,255,255,0.08)}
.ctrl svg{fill:#fff;width:28px;height:28px}
.ctrl.main{background:linear-gradient(135deg,#6c5ce7,#a855f7);min-width:64px;min-height:64px;border-radius:50%}
.ctrl.main svg{width:36px;height:36px}
.ctrl.main:active{background:linear-gradient(135deg,#5a4bd6,#9645e6)}
.ctrl.side svg{width:22px;height:22px;fill:#666}
.ctrl.side.on svg{fill:#c8a54e}
.tab-row{display:flex;gap:5px;padding:8px 12px 6px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-row::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;font-size:12px;font-weight:600;color:#666;border:1px solid #1a1a2a;border-radius:18px;cursor:pointer;background:none;white-space:nowrap;min-height:38px;display:flex;align-items:center;flex-shrink:0}
.tab.active{color:#c8a54e;border-color:#c8a54e;background:rgba(200,165,78,0.08)}
.tab:active{background:rgba(255,255,255,0.05)}
.playlist{flex:1;overflow-y:auto;padding:2px 10px 100px;-webkit-overflow-scrolling:touch}
.track{display:flex;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid #0f0f18;cursor:pointer;border-radius:8px;min-height:56px;transition:background 0.12s}
.track:active{background:rgba(108,92,231,0.12)}
.track.active{background:rgba(200,165,78,0.08)}
.track.active .t-title{color:#c8a54e}
.track.active .t-num{display:none}
.track.active .eq{display:flex}
.track.error .t-title{color:#555;text-decoration:line-through}
.t-thumb{width:44px;height:44px;border-radius:6px;background:#1a1a2a;flex-shrink:0;overflow:hidden}
.t-thumb img{width:100%;height:100%;object-fit:cover}
.t-num{width:24px;font-size:13px;color:#444;text-align:center;flex-shrink:0;font-weight:600}
.t-info{flex:1;min-width:0}
.t-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-artist{font-size:11px;color:#666;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eq{display:none;width:18px;height:18px;gap:2px;align-items:flex-end;flex-shrink:0}
.eq span{width:3px;background:#c8a54e;border-radius:2px;animation:eq 0.7s ease-in-out infinite alternate}
.eq span:nth-child(2){animation-delay:0.15s}
.eq span:nth-child(3){animation-delay:0.3s}
@keyframes eq{0%{height:3px}100%{height:14px}}
.kitt-display{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:36px;padding:4px 16px;background:linear-gradient(180deg,#08080c 0%,#0a0a10 100%);border-top:1px solid rgba(200,165,78,0.1);flex-shrink:0;position:relative;z-index:1}
.kitt-bar{width:4px;min-height:2px;border-radius:2px 2px 0 0;transition:height 0.08s ease-out}
.kitt-display.idle .kitt-bar{animation:kittBreath 2s ease-in-out infinite}
.kitt-display.idle .kitt-bar:nth-child(odd){animation-delay:0.3s}
.kitt-display.idle .kitt-bar:nth-child(3n){animation-delay:0.7s}
@keyframes kittBreath{0%,100%{opacity:0.25;height:2px}50%{opacity:0.5;height:8px}}
.kitt-bar.glow{box-shadow:0 0 6px rgba(200,165,78,0.5)}
#ytWrap{position:fixed;bottom:0;right:0;width:2px;height:2px;overflow:hidden;opacity:0.01;z-index:-1}
.splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity 0.6s}
.splash.hide{opacity:0;pointer-events:none}
.splash-logo{width:140px;height:140px;opacity:0;animation:logoIn 1.2s ease-out 0.3s forwards}
.splash-text{font-size:18px;color:#c8a54e;letter-spacing:8px;font-weight:700;margin-top:24px;opacity:0;animation:textIn 0.8s ease-out 1.2s forwards}
.splash-line{width:60px;height:2px;background:linear-gradient(90deg,transparent,#c8a54e,transparent);margin-top:12px;opacity:0;animation:textIn 0.8s ease-out 1.5s forwards}
@keyframes logoIn{0%{opacity:0;transform:scale(0.5)}60%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes textIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 8px rgba(200,165,78,0.3))}50%{filter:drop-shadow(0 0 20px rgba(200,165,78,0.6))}}
.splash-logo.pulse{animation:logoPulse 1.5s ease-in-out infinite}
.loading{position:fixed;inset:0;background:rgba(8,8,12,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 0.5s}
.loading.hide{opacity:0;pointer-events:none}
.spinner{width:44px;height:44px;border:3px solid #1a1a2a;border-top-color:#c8a54e;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{margin-top:16px;color:#444;font-size:12px;letter-spacing:2px}
@media(orientation:landscape) and (max-height:500px){
.now-playing{padding:8px 20px 8px}.np-art{width:56px;height:56px}.np-title{font-size:16px}.controls{gap:14px}
.ctrl{min-width:42px;min-height:42px;padding:6px}.ctrl.main{min-width:54px;min-height:54px}
.track{padding:8px;min-height:46px}.tab{padding:6px 12px;font-size:11px;min-height:34px}
.playlist{padding-bottom:50px}.t-thumb{width:36px;height:36px}
}
</style>
</head>
<body>
<div class="top-bar">
<h1>ACE PLAYER</h1>
<span class="status" id="status">Loading</span>

const TAB_NAMES={top40:'Top 40',ace:'Ace Burns',drake:'Drizzy',bars:'Bars',heat:'Heat',queens:'Queens',afro:'Afro',smooth:'Smooth',soul:'Soul',vibes:'Vibes',santana:'Santana',meditation:'Meditate',workout:'Workout',skating:'Skating'};
const TAB_ORDER=['top40','ace','drake','bars','heat','queens','afro','smooth','soul','vibes','santana','meditation','workout','skating'];

let cur='ace',idx=-1,yt=null,ready=false;
let shuf=false,rep=false,timer=null,shufQ=[];
let errSet=new Set(),retries=0;

var hasAndroidBridge=(typeof AndroidBridge!=='undefined');
function bridgeStateChange(s){if(hasAndroidBridge)try{AndroidBridge.onStateChange(s);}catch(e){}}
function bridgeVideoInfo(id,t,a){if(hasAndroidBridge)try{AndroidBridge.onVideoInfo(id,t,a);}catch(e){}}
function bridgeError(c){if(hasAndroidBridge)try{AndroidBridge.onError(c);}catch(e){}}
function bridgeReady(){if(hasAndroidBridge)try{AndroidBridge.onPlayerReady();}catch(e){}}

var player={
playVideo:function(){if(useDirectAudio){ap.play();}else if(yt)yt.playVideo();},
pauseVideo:function(){if(useDirectAudio){ap.pause();}else if(yt)yt.pauseVideo();},
seekTo:function(s,a){if(useDirectAudio){ap.currentTime=s;}else if(yt)yt.seekTo(s,a);},
loadVideoById:function(id){loadDirectAudio(id);},
getCurrentTime:function(){return useDirectAudio?ap.currentTime:(yt?yt.getCurrentTime():0);},
getDuration:function(){return useDirectAudio?(ap.duration||0):(yt?yt.getDuration():0);},
getPlayerState:function(){if(useDirectAudio)return ap.paused?2:1;return yt?yt.getPlayerState():-1;}
};
function nextTrack(){next();}
function previousTrack(){prev();}

function renderTabs(){
document.getElementById('tabs').innerHTML=TAB_ORDER.map(function(k){
return '<button class="tab'+(k===cur?' active':'')+'" onclick="switchPL(\''+k+'\')">'+TAB_NAMES[k]+'</button>';
}).join('');
}

function renderPL(){
var tracks=PL[cur];
document.getElementById('pl').innerHTML=tracks.map(function(t,i){
var broken=errSet.has(t.id);
return '<div class="track'+(i===idx?' active':'')+(broken?' error':'')+'" onclick="play('+i+')" id="tr'+i+'">'+
'<div class="t-thumb"><img src="'+T(t.id)+'" loading="lazy" alt=""></div>'+
'<span class="t-num">'+(i+1)+'</span>'+
'<div class="eq"><span></span><span></span><span></span></div>'+
'<div class="t-info"><div class="t-title">'+t.t+'</div><div class="t-artist">'+t.a+'</div></div>'+
'</div>';
}).join('');
}

function switchPL(k){cur=k;idx=-1;retries=0;renderTabs();buildShuf();renderPL();}

var ap=document.getElementById('audioPlayer');
var useDirectAudio=true;

function play(i){
var tracks=PL[cur];
if(i<0||i>=tracks.length)return;
idx=i;retries=0;
var t=tracks[i];
document.getElementById('npTitle').textContent=t.t;
document.getElementById('npArtist').textContent=t.a;
document.getElementById('npImg').src=T(t.id);
renderPL();
var el=document.getElementById('tr'+i);
if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
setIcon(true);startTimer();stat('Loading...');
bridgeVideoInfo(t.id,t.t,t.a);
// Try direct audio stream first (background playback works)
loadDirectAudio(t.id);
if('mediaSession' in navigator){
navigator.mediaSession.metadata=new MediaMetadata({title:t.t,artist:t.a,album:'ACE PLAYER',artwork:[{src:T(t.id),sizes:'320x180',type:'image/jpeg'}]});
navigator.mediaSession.setActionHandler('play',function(){togglePlay();});
navigator.mediaSession.setActionHandler('pause',function(){togglePlay();});
navigator.mediaSession.setActionHandler('nexttrack',function(){next();});
navigator.mediaSession.setActionHandler('previoustrack',function(){prev();});
}
}

function loadDirectAudio(videoId){
stat('Loading stream...');
fetch('https://ace-taskmaster.duckdns.org/audio?v='+videoId)
.then(function(r){return r.json();})
.then(function(d){
if(d.url){
useDirectAudio=true;
ap.src=d.url;
ap.play().catch(function(){
// Direct audio failed, fall back to YouTube iframe
useDirectAudio=false;
if(ready){yt.loadVideoById({videoId:videoId,startSeconds:0});setTimeout(function(){try{yt.playVideo();}catch(e){}},300);}
});
stat('Playing');
} else {throw new Error('no url');}
})
.catch(function(){
// Fallback to YouTube iframe
useDirectAudio=false;
if(ready){yt.loadVideoById({videoId:videoId,startSeconds:0});setTimeout(function(){try{yt.playVideo();}catch(e){}},300);}
});
}

function togglePlay(){
if(useDirectAudio){
if(ap.paused){ap.play();setIcon(true);stat('Playing');kittActivate();if('mediaSession' in navigator)navigator.mediaSession.playbackState='playing';}
else{ap.pause();setIcon(false);stat('Paused');kittDeactivate();if('mediaSession' in navigator)navigator.mediaSession.playbackState='paused';}
return;
}
if(!ready)return;
var s=yt.getPlayerState();
if(s===1){yt.pauseVideo();setIcon(false);stat('Paused');}
else{yt.playVideo();setIcon(true);stat('Playing');}
}

function next(){
var tracks=PL[cur];
if(shuf){var si=shufQ.indexOf(idx);play(shufQ[(si+1)%shufQ.length]);}
else{play((idx+1)%tracks.length);}
}

function prev(){
if(useDirectAudio&&ap.currentTime>3){ap.currentTime=0;return;}
if(!useDirectAudio&&ready&&yt.getCurrentTime&&yt.getCurrentTime()>3){yt.seekTo(0);return;}
var tracks=PL[cur];
if(shuf){var si=shufQ.indexOf(idx);play(shufQ[(si-1+shufQ.length)%shufQ.length]);}
else{play((idx-1+tracks.length)%tracks.length);}
}

function toggleShuffle(){shuf=!shuf;document.getElementById('shufBtn').classList.toggle('on',shuf);if(shuf)buildShuf();}
function toggleRepeat(){rep=!rep;document.getElementById('repBtn').classList.toggle('on',rep);}

function buildShuf(){
var n=PL[cur].length;shufQ=[];for(var i=0;i<n;i++)shufQ.push(i);
for(var i=n-1;i>0;i--){var j=Math.random()*i|0;var tmp=shufQ[i];shufQ[i]=shufQ[j];shufQ[j]=tmp;}
}

function startTimer(){
if(timer)clearInterval(timer);
timer=setInterval(function(){
var c,d;
if(useDirectAudio){c=ap.currentTime||0;d=ap.duration||1;}
else{if(!ready||!yt.getCurrentTime)return;c=yt.getCurrentTime()||0;d=yt.getDuration()||1;}
if(isNaN(d)||d===0)d=1;
var p=(c/d)*100;
document.getElementById('progFill').style.width=p+'%';
document.getElementById('progKnob').style.left=p+'%';
document.getElementById('tNow').textContent=fmt(c);
document.getElementById('tEnd').textContent=fmt(d);
},500);
}

document.getElementById('progWrap').addEventListener('click',function(e){
var r=e.currentTarget.getBoundingClientRect();
var pos=(e.clientX-r.left)/r.width;
if(useDirectAudio){ap.currentTime=pos*(ap.duration||0);}
else if(ready){yt.seekTo(pos*(yt.getDuration()||0),true);}
});

var dragging=false;
document.getElementById('progWrap').addEventListener('touchstart',function(){dragging=true;},{passive:true});
document.getElementById('progWrap').addEventListener('touchmove',function(e){
if(!dragging||!ready)return;
var r=e.currentTarget.getBoundingClientRect();
var p=Math.max(0,Math.min(1,(e.touches[0].clientX-r.left)/r.width));
document.getElementById('progFill').style.width=(p*100)+'%';
document.getElementById('progKnob').style.left=(p*100)+'%';
},{passive:true});
document.getElementById('progWrap').addEventListener('touchend',function(e){
if(!dragging)return;dragging=false;
var r=e.currentTarget.getBoundingClientRect();
var p=Math.max(0,Math.min(1,(e.changedTouches[0].clientX-r.left)/r.width));
if(useDirectAudio){ap.currentTime=p*(ap.duration||0);}
else if(ready){yt.seekTo(p*(yt.getDuration()||0),true);}
},{passive:true});

function fmt(s){if(!s||isNaN(s))return'0:00';s=Math.floor(s);return(s/60|0)+':'+(s%60<10?'0':'')+(s%60);}
function stat(t){document.getElementById('status').textContent=t;}
function setIcon(playing){
document.getElementById('ppIco').innerHTML=playing?
'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';
}

function autoPlayFirst(){if(idx===-1&&PL[cur].length>0)play(0);}

function runSplashIntro(){
var sp=document.getElementById('splash');
var logo=document.getElementById('splashLogo');
var credit=document.getElementById('splashCredit');
var chime=new Audio('https://ace-taskmaster.duckdns.org/intro.mp3');
chime.volume=0.8;
try{chime.play();}catch(e){}
// Phase 1: Logo animates in via CSS (0-1.5s)
// Phase 2: "Made by Israel Adam Burns" at 1.8s
setTimeout(function(){credit.style.transition='opacity 0.8s';credit.style.opacity='1';},1800);
// Phase 3: Flash — bright gold glow at 3s
setTimeout(function(){
logo.style.filter='drop-shadow(0 0 40px rgba(200,165,78,1)) brightness(1.3)';
setTimeout(function(){logo.style.filter='';},400);
},3000);
// Phase 4: Splash out — done
setTimeout(function(){
sp.classList.add('hide');
chime.pause();
setTimeout(function(){sp.remove();stat('Tap a track');autoPlayFirst();},600);
},4500);
}

// KITT WAVE BARS
var KITT_COUNT=40;
var kittEl=document.getElementById('kittDisplay');
var kittCenter=KITT_COUNT/2;
for(var ki=0;ki<KITT_COUNT;ki++){
var kb=document.createElement('div');
kb.className='kitt-bar';
var dist=Math.abs(ki-kittCenter)/kittCenter;
var r=Math.round(200-dist*30),g=Math.round(165-dist*28),b=Math.round(55+dist*30);
kb.style.background='rgba('+r+','+g+','+b+','+(1-dist*0.35).toFixed(2)+')';
kittEl.appendChild(kb);
}
var kittBars=kittEl.querySelectorAll('.kitt-bar');
var kittInterval=null;

function kittActivate(){
kittEl.classList.remove('idle');
if(kittInterval)clearInterval(kittInterval);
kittInterval=setInterval(function(){
for(var i=0;i<KITT_COUNT;i++){
var dist=Math.abs(i-kittCenter)/kittCenter;
var h=Math.max(2,(Math.random()*(1-dist*0.4))*30);
kittBars[i].style.height=h+'px';
kittBars[i].style.opacity=(0.4+Math.random()*0.6).toFixed(2);
if(h>18)kittBars[i].classList.add('glow');
else kittBars[i].classList.remove('glow');
}
},80);
}

function kittDeactivate(){
if(kittInterval){clearInterval(kittInterval);kittInterval=null;}
for(var i=0;i<KITT_COUNT;i++){
kittBars[i].style.height='';
kittBars[i].style.opacity='';
kittBars[i].classList.remove('glow');
}
kittEl.classList.add('idle');
}

// Keep audio session alive when screen is off (prevents browser from suspending audio)
var silentCtx=null;
function keepAudioAlive(){
if(silentCtx)return;
try{
silentCtx=new(window.AudioContext||window.webkitAudioContext)();
var osc=silentCtx.createOscillator();
var gain=silentCtx.createGain();
gain.gain.value=0.001;
osc.connect(gain);
gain.connect(silentCtx.destination);
osc.start();
}catch(e){}
}
// Resume audio context when page becomes visible again
document.addEventListener('visibilitychange',function(){
if(!document.hidden&&silentCtx&&silentCtx.state==='suspended'){silentCtx.resume();}
if(!document.hidden&&yt&&yt.getPlayerState&&yt.getPlayerState()===2){
// If player was paused by browser suspension, resume it
var wasPlaying=document.getElementById('ppIco').innerHTML.indexOf('M6 19')>-1;
if(wasPlaying)try{yt.playVideo();}catch(e){}
}
});

// Audio element event listeners (direct stream mode)
ap.addEventListener('playing',function(){setIcon(true);stat('Playing');kittActivate();bridgeStateChange(1);if('mediaSession' in navigator)navigator.mediaSession.playbackState='playing';});
ap.addEventListener('pause',function(){setIcon(false);stat('Paused');kittDeactivate();bridgeStateChange(2);if('mediaSession' in navigator)navigator.mediaSession.playbackState='paused';});
ap.addEventListener('ended',function(){if(rep)play(idx);else next();});
ap.addEventListener('error',function(){
// Direct audio failed — fall back to YouTube iframe
var tracks=PL[cur];
if(idx>=0&&idx<tracks.length){
useDirectAudio=false;
stat('Switching to fallback...');
if(ready){yt.loadVideoById({videoId:tracks[idx].id,startSeconds:0});setTimeout(function(){try{yt.playVideo();}catch(e){}},300);}
}
});

var tag=document.createElement('script');
tag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady=function(){
yt=new YT.Player('yt',{
width:'320',height:'180',
playerVars:{autoplay:1,controls:0,disablekb:1,fs:0,modestbranding:1,rel:0,playsinline:1,enablejsapi:1},
events:{
onReady:function(){ready=true;document.getElementById('loader').classList.add('hide');runSplashIntro();bridgeReady();},
onStateChange:function(e){
if(useDirectAudio)return; // Direct audio handles its own state
bridgeStateChange(e.data);
if(e.data===1){setIcon(true);stat('Playing');retries=0;kittActivate();if('mediaSession' in navigator)navigator.mediaSession.playbackState='playing';}
if(e.data===2){setIcon(false);stat('Paused');kittDeactivate();if('mediaSession' in navigator)navigator.mediaSession.playbackState='paused';}
if(e.data===0){if(rep)play(idx);else next();}
if(e.data===-1&&idx>=0){setTimeout(function(){try{yt.playVideo();}catch(e){}},500);}
},
onError:function(e){
bridgeError(e.data);
var tracks=PL[cur];
if(idx>=0&&idx<tracks.length){errSet.add(tracks[idx].id);renderPL();}
retries++;stat('Blocked — skipping');
if(retries<tracks.length){setTimeout(function(){next();},800);}
else{stat('All tracks blocked');retries=0;}
}
}
});
};

buildShuf();renderTabs();renderPL();
